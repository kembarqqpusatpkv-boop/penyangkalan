<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>linkgacorkembarqq</title>
  <style>
    body {
      background-image: url('bujang.jpg');
      background-size: cover; /* Lebih responsif daripada 100% 100% */
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-color: #0a0a0a; /* Warna cadangan jika gambar gagal dimuat */
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
    }

    h1 {
      letter-spacing: 4px;
      font-size: 1.8rem;
      color: #FFA500;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
      margin-bottom: 40px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Mengubah div menjadi link agar bisa diklik seluruh area */
    .rtp-item {
      text-decoration: none; /* Hilangkan garis bawah link */
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-radius: 12px;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px); /* Efek kaca */
    }

    .rtp-item:hover {
      background: rgba(0, 255, 204, 0.1);
      border-color: #FFA500;
      transform: translateX(8px);
      box-shadow: 0 0 15px rgba(255, 165, 0, 0.3);
    }

    .game-info {
      display: flex;
      flex-direction: column;
    }

    .game-name {
      color: #ffffff;
      font-weight: bold;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .status {
      font-size: 0.75rem;
      color: #FFA500;
      display: flex;
      align-items: center;
    }

    /* Animasi titik kedip */
    .dot {
      height: 8px;
      width: 8px;
      background-color: #00ffcc; /* Hijau neon agar lebih terlihat */
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 8px #00ffcc;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .rtp-value {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 1.2rem;
      color: #00ffcc;
    }
    .popup-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
}

.popup-content {
    background: #000;
    width: 90%;
    max-width: 400px; /* Ukuran maksimal pop-up */
    border: 2px solid #ff00ff; /* Warna pink neon */
    box-shadow: 0 0 15px #ff00ff;
    text-align: center;
    overflow: hidden;
}

.popup-img {
    width: 100%;
    height: auto;
    border-bottom: 2px solid #ff00ff;
}

.popup-text {
    padding: 15px;
    color: #fff;
}

.popup-content h2 { color: #ff00ff; margin: 0; font-size: 1.5rem; }

.popup-content button {
    background: #ff00ff;
    color: #000;
    border: none;
    padding: 12px 0;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: 0.3s;
}

.popup-content button:hover {
    background: #fff;
}
  </style>
</head>
<body>
    <div id="popup-cyber" class="popup-overlay">
    <div class="popup-content">
        <img src="taik.png" alt="Promo" class="popup-img">
        
        <div class="popup-text">
            <h2></h2>
            <p>LINK GACOR KEMBARQQ</p>
        </div>
        <button onclick="closePopup()">CLOSE</button>
    </div>
</div>

  <h1>KEMBARQQ LINK GACOR</h1>

  <div class="container">
    <a href="https://kembarqqjitu.net/"target="_blank" class="rtp-item">
      <div class="game-info">
        <span class="game-name">LINK ALTERNATIF</span>
        <span class="status"><span class="dot"></span> Klik untuk Login</span>
      </div>
      <div class="rtp-value"></div>
    </a>

    <a href="https://tinyurl.com/pkvmejahoki/"target="_blank" class="rtp-item">
      <div class="game-info">
        <span class="game-name">RTP DAN MEJA HOKI</span>
        <span class="status"><span class="dot"></span> Klik untuk melihat RTP</span>
      </div>
      <div class="rtp-value"></div>
    </a>

    <a href="https://kembarqqpro.net/Register.aspx?lang=id/"target="_blank" class="rtp-item">
      <div class="game-info">
        <span class="game-name">DAFTAR SEKARANG</span>
        <span class="status"><span class="dot"></span> Klik untuk Daftar</span>
      </div>
      <div class="rtp-value"></div>
    </a>
  </div>
<script>
    function closePopup() {
        document.getElementById('popup-cyber').style.display = 'none';
    }
</script>
</body>
</html>
